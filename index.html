<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>clips</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(180deg, #081a3a, #000000);
    color:white;
}

.container{
    display:flex;
}

.player{
    width:70%;
    padding:20px;
}

.player video{
    width:100%;
    border-radius:10px;
}

.video-title{
    font-size:22px;
    margin-top:10px;
}

.sidebar{
    width:30%;
    padding:20px;
}

/* preview menor */
.video-card{
    display:flex;
    margin-bottom:15px;
    cursor:pointer;
}

.thumb{
    position:relative;
}

.thumb video{
    width:120px;
    height:68px;
    object-fit:cover;
    border-radius:8px;
}

.duration{
    position:absolute;
    bottom:4px;
    right:4px;
    background:black;
    font-size:12px;
    padding:2px 4px;
    border-radius:4px;
}

.video-info{
    margin-left:10px;
}

.video-name{
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="player">
<video id="mainVideo" controls></video>
<div class="video-title" id="videoTitle"></div>
</div>

<div class="sidebar" id="videoList"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDsGHkgjKovIpVcCeZAQNet424lhvqQiUk",
  authDomain: "clips-firebase-56329.firebaseapp.com",
  projectId: "clips-firebase-56329",
  databaseURL: "https://clips-firebase-56329-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LISTA DE VIDEOS
const videos = [
"video1.mp4",
"video2.mp4",
"video3.mp4"
]

const list = document.getElementById("videoList")
const mainVideo = document.getElementById("mainVideo")
const title = document.getElementById("videoTitle")

function formatTime(sec){
    sec = Math.floor(sec)
    let m = Math.floor(sec / 60)
    let s = sec % 60
    if(s < 10) s = "0"+s
    return m+":"+s
}

function loadVideo(name){
    mainVideo.src = "videos/" + name
    title.innerText = name
}

// ADICIONAR VIEW
function addView(video){
    const ref = db.ref("views/" + video)

    ref.transaction(current => {
        return (current || 0) + 1
    })
}

// CRIAR LISTA
videos.forEach(v => {

    const card = document.createElement("div")
    card.className = "video-card"

    const thumb = document.createElement("div")
    thumb.className = "thumb"

    const preview = document.createElement("video")
    preview.src = "videos/" + v

    const duration = document.createElement("div")
    duration.className = "duration"

    preview.onloadedmetadata = () => {
        duration.innerText = formatTime(preview.duration)
    }

    thumb.appendChild(preview)
    thumb.appendChild(duration)

    const info = document.createElement("div")
    info.className = "video-info"

    const name = document.createElement("div")
    name.className = "video-name"
    name.innerText = v

    // VIEWS
    const viewsText = document.createElement("div")
    viewsText.style.fontSize = "12px"

    db.ref("views/" + v).on("value", snap => {
        viewsText.innerText = (snap.val() || 0) + " views"
    })

    info.appendChild(name)
    info.appendChild(viewsText)

    card.appendChild(thumb)
    card.appendChild(info)

    card.onclick = () => {
        loadVideo(v)
        addView(v)
    }

    list.appendChild(card)

})

// carregar primeiro vídeo
loadVideo(videos[0])

</script>

</body>
</html>
