<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>clips</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}

.container{
    display:flex;
}

/* PLAYER */

.player{
    width:70%;
    padding:20px;
}

.player video{
    width:100%;
    max-height:70vh;
    border-radius:10px;
}

/* INFO */

.video-title{
    font-size:22px;
    margin-top:10px;
}

.video-stats{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

/* BOTÃO LIKE */

.like-btn{
    margin-top:10px;
    background:white;
    color:black;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;

    transition: background 0.5s, color 0.5s;
}

.like-btn.animating{
    background:black;
    color:black;
}

.like-btn.liked{
    background:#3ea6ff;
    color:black;
}

/* SIDEBAR */

.sidebar{
    width:30%;
    padding:20px;
}

/* VIDEO CARD */

.video-card{
    display:flex;
    margin-bottom:15px;
    cursor:pointer;
}

.thumb video{
    width:120px;
    height:68px;
    object-fit:cover;
    border-radius:8px;
}

.video-info{
    margin-left:10px;
}

.video-name{
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="player">

<video id="mainVideo" controls></video>

<div class="video-title" id="videoTitle"></div>
<div class="video-stats" id="videoStats"></div>
<button class="like-btn" id="likeBtn">👍 Curtir</button>

</div>

<div class="sidebar" id="videoList"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDsGHkgjKovIpVcCeZAQNet424lhvqQiUk",
  authDomain: "clips-firebase-56329.firebaseapp.com",
  databaseURL: "https://clips-firebase-56329-default-rtdb.firebaseio.com",
  projectId: "clips-firebase-56329",
  storageBucket: "clips-firebase-56329.firebasestorage.app",
  messagingSenderId: "496262241949",
  appId: "1:496262241949:web:5e6761d129cbf361373e74"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const videos = [
  { file: "video1.mp4", title: "Clip insano 🔥" },
  { file: "video2.mp4", title: "Jogada absurda 😳" },
  { file: "video3.mp4", title: "Momento engraçado 😂" }
]

const list = document.getElementById("videoList")
const mainVideo = document.getElementById("mainVideo")
const title = document.getElementById("videoTitle")
const stats = document.getElementById("videoStats")
const likeBtn = document.getElementById("likeBtn")

let currentVideo = null
let counted = false

function safeKey(name){
    return name.replace(/\./g, "_")
}

function updateLikeButton(){

    const key = safeKey(currentVideo)

    if(localStorage.getItem("liked_" + key)){
        likeBtn.innerText = "👍 Curtido"
        likeBtn.classList.add("liked")
    } else {
        likeBtn.innerText = "👍 Curtir"
        likeBtn.classList.remove("liked")
    }

}

function loadVideo(video){

    mainVideo.src = "videos/" + video.file
    title.innerText = video.title

    currentVideo = video.file
    counted = false

    updateLikeButton()

    const key = safeKey(video.file)

    db.ref("views/" + key).on("value", snap => {
        const views = snap.val() || 0
        db.ref("likes/" + key).on("value", snap2 => {
            const likes = snap2.val() || 0
            stats.innerText = views + " views • " + likes + " likes"
        })
    })
}

// views
function addView(video){
    const key = safeKey(video)

    if(localStorage.getItem("viewed_" + key)) return;
    localStorage.setItem("viewed_" + key, "1")

    db.ref("views/" + key).transaction(v => (v || 0) + 1)
}

// likes
function addLike(video){
    const key = safeKey(video)

    if(localStorage.getItem("liked_" + key)) return;
    localStorage.setItem("liked_" + key, "1")

    db.ref("likes/" + key).transaction(v => (v || 0) + 1)
}

// play = view
mainVideo.addEventListener("play", () => {
    if(!counted && currentVideo){
        addView(currentVideo)
        counted = true
    }
})

// botão like com animação
likeBtn.onclick = () => {

    if(!currentVideo) return;

    const key = safeKey(currentVideo)

    if(localStorage.getItem("liked_" + key)) return;

    likeBtn.classList.add("animating")

    setTimeout(() => {

        addLike(currentVideo)

        likeBtn.classList.remove("animating")
        likeBtn.classList.add("liked")
        likeBtn.innerText = "👍 Curtido"

    }, 500)
}

// lista
videos.forEach(v => {

    const card = document.createElement("div")
    card.className = "video-card"

    const thumb = document.createElement("div")
    thumb.className = "thumb"

    const preview = document.createElement("video")
    preview.src = "videos/" + v.file

    thumb.appendChild(preview)

    const info = document.createElement("div")
    info.className = "video-info"

    const name = document.createElement("div")
    name.className = "video-name"
    name.innerText = v.title

    const viewsText = document.createElement("div")
    viewsText.style.fontSize = "12px"

    const key = safeKey(v.file)

    db.ref("views/" + key).on("value", snap => {
        viewsText.innerText = (snap.val() || 0) + " views"
    })

    info.appendChild(name)
    info.appendChild(viewsText)

    card.appendChild(thumb)
    card.appendChild(info)

    card.onclick = () => loadVideo(v)

    list.appendChild(card)

})

loadVideo(videos[0])

</script>

</body>
</html>
