<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>clips</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}

/* layout */

.container{
    display:flex;
}

/* PLAYER */

.player{
    width:75%;
    padding:20px;
}

.player video{
    width:80%;
    border-radius:10px;
}

.video-title{
    font-size:22px;
    margin-top:10px;
}

/* SIDEBAR */

.sidebar{
    width:75%;
    padding:30px;
}

/* VIDEO CARD */

.video-card{
    display:flex;
    margin-bottom:15px;
    cursor:pointer;
}

.thumb{
    position:relative;
}

.thumb video{
    width:120px;
    height:68px;
    object-fit:cover;
    border-radius:8px;
}

.duration{
    position:absolute;
    bottom:4px;
    right:4px;
    background:black;
    font-size:12px;
    padding:2px 4px;
    border-radius:4px;
}

.video-info{
    margin-left:10px;
}

.video-name{
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="player">

<video id="mainVideo" controls></video>
<div class="video-title" id="videoTitle"></div>

</div>

<div class="sidebar" id="videoList"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// CONFIG (usa os teus dados reais)
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  databaseURL: "SUA_DATABASE_URL"
};

let db = null;

try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch(e){
    console.log("Firebase erro:", e);
}

// VIDEOS
const videos = [
"video1.mp4",
"video2.mp4",
"video3.mp4"
]

const list = document.getElementById("videoList")
const mainVideo = document.getElementById("mainVideo")
const title = document.getElementById("videoTitle")

let currentVideo = null
let counted = false

// 🔥 limpa nome pro Firebase
function safeKey(name){
    return name.replace(/\./g, "_")
}

function formatTime(sec){

    sec = Math.floor(sec)

    let m = Math.floor(sec / 60)
    let s = sec % 60

    if(s < 10) s = "0"+s

    return m+":"+s
}

function loadVideo(name){

    mainVideo.src = "videos/" + name
    title.innerText = name

    currentVideo = name
    counted = false
}

// VIEW SYSTEM
function addView(video){

    if(!db) return;

    const key = safeKey(video)

    // anti spam local
    if(localStorage.getItem("viewed_" + key)) return;

    localStorage.setItem("viewed_" + key, "1")

    const ref = db.ref("views/" + key)

    ref.transaction(current => {
        return (current || 0) + 1
    })
}

// conta view quando dá play
mainVideo.addEventListener("play", () => {

    if(!counted && currentVideo){
        addView(currentVideo)
        counted = true
    }

})

// criar lista
videos.forEach(v => {

    const card = document.createElement("div")
    card.className = "video-card"

    const thumb = document.createElement("div")
    thumb.className = "thumb"

    const preview = document.createElement("video")
    preview.src = "videos/" + v

    const duration = document.createElement("div")
    duration.className = "duration"

    preview.onloadedmetadata = () => {
        duration.innerText = formatTime(preview.duration)
    }

    thumb.appendChild(preview)
    thumb.appendChild(duration)

    const info = document.createElement("div")
    info.className = "video-info"

    const name = document.createElement("div")
    name.className = "video-name"
    name.innerText = v

    // VIEWS TEXT
    const viewsText = document.createElement("div")
    viewsText.style.fontSize = "12px"

    const key = safeKey(v)

    if(db){
        db.ref("views/" + key).on("value", snap => {
            viewsText.innerText = (snap.val() || 0) + " views"
        })
    } else {
        viewsText.innerText = "0 views"
    }

    info.appendChild(name)
    info.appendChild(viewsText)

    card.appendChild(thumb)
    card.appendChild(info)

    card.onclick = () => {
        loadVideo(v)
    }

    list.appendChild(card)

})

// carregar primeiro vídeo
loadVideo(videos[0])

</script>

</body>
</html>
