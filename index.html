<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>clips</title>

<style>

body{
    margin:0;
    background:#040034;
    color:white;
    font-family:Arial;
}

.container{
    display:flex;
}

/* PLAYER */

.player{
    width:70%;
    padding:20px;
    position:relative;
}

.player video{
    width:100%;
    max-height:70vh;
    border-radius:10px;
}

/* THUMB NO PLAYER */

.video-thumb{
    position:absolute;
    top:20px;
    left:20px;
    width:calc(100% - 40px);
    max-height:70vh;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    display:none;
}

/* INFO */

.video-title{
    font-size:22px;
    margin-top:10px;
}

.video-stats{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

/* BOTÃO LIKE */

.like-btn{
    margin-top:10px;
    background:white;
    color:black;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
    transition: background 0.5s, color 0.5s;
}

.like-btn.animating{
    background:black;
    color:black;
}

.like-btn.liked{
    background:#3ea6ff;
    color:black;
}

.like-btn.unliking{
    background:white;
    color:white;
}

/* SIDEBAR */

.sidebar{
    width:30%;
    padding:20px;
}

.video-card{
    display:flex;
    margin-bottom:15px;
    cursor:pointer;
}

.thumb img{
    width:120px;
    height:70px;
    object-fit:cover;
    border-radius:8px;
}

.video-info{
    margin-left:10px;
}

.video-name{
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="player">

<video id="mainVideo" controls></video>
<img id="videoThumb" class="video-thumb">

<div class="video-title" id="videoTitle"></div>
<div class="video-stats" id="videoStats"></div>
<button class="like-btn" id="likeBtn">👍</button>

</div>

<div class="sidebar" id="videoList"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDsGHkgjKovIpVcCeZAQNet424lhvqQiUk",
  authDomain: "clips-firebase-56329.firebaseapp.com",
  databaseURL: "https://clips-firebase-56329-default-rtdb.firebaseio.com",
  projectId: "clips-firebase-56329",
  storageBucket: "clips-firebase-56329.firebasestorage.app",
  messagingSenderId: "496262241949",
  appId: "1:496262241949:web:5e6761d129cbf361373e74"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LISTA DE VÍDEOS
const videos = [
  { thumb: "thumbnail1.png", video: "video1.mp4", title: "zRicky" },
  { thumb: "thumbnail2.png", video: "video2.mp4", title: "Burlas" },
  { thumb: "thumbnail3.png", video: "video3.mp4", title: "Lava Land" },
  { thumb: "thumbnail4.png", video: "video4.mp4", title: "p-x igoro" },
  { thumb: "thumbnail5.png", video: "video5.mp4", title: "p-x igoro2" },
  { thumb: "thumbnail6.png", video: "video6.mp4", title: "mtzx" }
]

const list = document.getElementById("videoList")
const mainVideo = document.getElementById("mainVideo")
const videoThumb = document.getElementById("videoThumb")
const title = document.getElementById("videoTitle")
const stats = document.getElementById("videoStats")
const likeBtn = document.getElementById("likeBtn")

let currentVideo = null
let counted = false

function safeKey(name){
    return name.replace(/\./g, "_")
}

function updateLikeButton(){
    const key = safeKey(currentVideo)

    if(localStorage.getItem("liked_" + key)){
        likeBtn.classList.add("liked")
    } else {
        likeBtn.classList.remove("liked")
    }
}

function loadVideo(video){

    mainVideo.src = "videos/" + video.video
    title.innerText = video.title

    currentVideo = video.video
    counted = false

    // MOSTRAR OU NÃO A THUMB
    if(video.thumb){
        videoThumb.src = "thumbnails/" + video.thumb
        videoThumb.style.display = "block"
    } else {
        videoThumb.style.display = "none"
    }

    updateLikeButton()

    const key = safeKey(video.video)

    db.ref("views/" + key).on("value", snap => {
        const views = snap.val() || 0
        db.ref("likes/" + key).on("value", snap2 => {
            const likes = snap2.val() || 0
            stats.innerText = views + " views • " + likes + " likes"
        })
    })
}

// clicar na thumb = play
videoThumb.onclick = () => {
    mainVideo.play()
}

// esconder thumb ao dar play
mainVideo.addEventListener("play", () => {

    videoThumb.style.display = "none"

    if(!counted && currentVideo){
        addView(currentVideo)
        counted = true
    }
})

// views
function addView(video){
    const key = safeKey(video)

    if(localStorage.getItem("viewed_" + key)) return;
    localStorage.setItem("viewed_" + key, "1")

    db.ref("views/" + key).transaction(v => (v || 0) + 1)
}

// likes
function addLike(video){
    const key = safeKey(video)

    localStorage.setItem("liked_" + key, "1")
    db.ref("likes/" + key).transaction(v => (v || 0) + 1)
}

function removeLike(video){
    const key = safeKey(video)

    localStorage.removeItem("liked_" + key)
    db.ref("likes/" + key).transaction(v => Math.max((v || 1) - 1, 0))
}

likeBtn.onclick = () => {

    if(!currentVideo) return;

    const key = safeKey(currentVideo)

    if(localStorage.getItem("liked_" + key)){
        likeBtn.classList.add("unliking")

        setTimeout(() => {
            removeLike(currentVideo)
            likeBtn.classList.remove("liked", "unliking")
        }, 500)

        return
    }

    likeBtn.classList.add("animating")

    setTimeout(() => {
        addLike(currentVideo)
        likeBtn.classList.remove("animating")
        likeBtn.classList.add("liked")
    }, 500)
}

// sidebar
videos.forEach(v => {

    const card = document.createElement("div")
    card.className = "video-card"

    const thumb = document.createElement("div")
    thumb.className = "thumb"

    // SÓ MOSTRA IMAGEM SE EXISTIR
    if(v.thumb){
        const preview = document.createElement("img")
        preview.src = "thumbnails/" + v.thumb
        thumb.appendChild(preview)
    }

    const info = document.createElement("div")
    info.className = "video-info"

    const name = document.createElement("div")
    name.className = "video-name"
    name.innerText = v.title

    const viewsText = document.createElement("div")
    viewsText.style.fontSize = "12px"

    const key = safeKey(v.video)

    db.ref("views/" + key).on("value", snap => {
        viewsText.innerText = (snap.val() || 0) + " views"
    })

    info.appendChild(name)
    info.appendChild(viewsText)

    card.appendChild(thumb)
    card.appendChild(info)

    card.onclick = () => loadVideo(v)

    list.appendChild(card)

})

loadVideo(videos[0])

</script>

</body>
</html>
