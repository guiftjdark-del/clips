<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>clips</title>

<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:15px;
    padding:20px;
}

.grid-item{
    cursor:pointer;
}

.grid-item video{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:10px;
}

.grid-title{
    font-size:14px;
    margin-top:5px;
}

.grid-views{
    font-size:12px;
    color:#aaa;
}

/* PLAYER */

.container{
    display:none;
}

.player{
    width:70%;
    padding:20px;
}

.player video{
    width:100%;
    max-height:70vh;
    border-radius:10px;
}

.sidebar{
    width:30%;
    padding:20px;
}

.video-card{
    display:flex;
    margin-bottom:15px;
    cursor:pointer;
}

.thumb video{
    width:120px;
    height:68px;
    object-fit:cover;
    border-radius:8px;
}

/* BOTÃO */

.back-btn{
    position:fixed;
    top:10px;
    left:10px;

    font-family:'Lilita One', cursive;
    font-size:28px;

    background:#0f0f0f;
    color:white;

    border:1.5px solid #00ff88;
    border-radius:12px;

    padding:5px 12px;
    cursor:pointer;

    display:none;
}

</style>
</head>

<body>

<!-- MÚSICA -->
<audio id="bgMusic" src="music.mp3" loop></audio>

<!-- HOME -->
<div id="home" class="grid"></div>

<button class="back-btn" id="backBtn" onclick="goHome()">←</button>

<!-- PLAYER -->
<div class="container" id="playerScreen">

<div class="player">
<video id="mainVideo" controls></video>
<div id="videoTitle"></div>
<div id="videoStats"></div>
</div>

<div class="sidebar" id="videoList"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDsGHkgjKovIpVcCeZAQNet424lhvqQiUk",
  authDomain: "clips-firebase-56329.firebaseapp.com",
  databaseURL: "https://clips-firebase-56329-default-rtdb.firebaseio.com",
  projectId: "clips-firebase-56329"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const videos = [
  { file: "video1.mp4", title: "Clip insano 🔥", date: "2026-03-15" },
  { file: "video2.mp4", title: "Jogada absurda 😳", date: "2026-03-10" },
  { file: "video3.mp4", title: "Momento engraçado 😂", date: "2026-03-01" }
]

const home = document.getElementById("home")
const playerScreen = document.getElementById("playerScreen")
const mainVideo = document.getElementById("mainVideo")
const title = document.getElementById("videoTitle")
const stats = document.getElementById("videoStats")
const list = document.getElementById("videoList")
const backBtn = document.getElementById("backBtn")
const music = document.getElementById("bgMusic")

function safeKey(name){
    return name.replace(/\./g, "_")
}

// TEMPO DESDE UPLOAD
function timeAgo(dateStr){

    const now = new Date()
    const date = new Date(dateStr)

    const diff = Math.floor((now - date) / 1000)

    const days = Math.floor(diff / 86400)
    if(days > 0) return "há " + days + " dias"

    const hours = Math.floor(diff / 3600)
    if(hours > 0) return "há " + hours + " horas"

    const mins = Math.floor(diff / 60)
    if(mins > 0) return "há " + mins + " min"

    return "agora"
}

// INICIAR MÚSICA
document.body.addEventListener("click", () => {
    music.volume = 0.2
    music.play().catch(()=>{})
}, { once:true })

// HOME GRID
videos.forEach(v => {

    const item = document.createElement("div")
    item.className = "grid-item"

    const vid = document.createElement("video")
    vid.src = "videos/" + v.file

    const t = document.createElement("div")
    t.className = "grid-title"
    t.innerText = v.title

    const views = document.createElement("div")
    views.className = "grid-views"

    db.ref("views/" + safeKey(v.file)).on("value", snap => {
        views.innerText = (snap.val() || 0) + " views • " + timeAgo(v.date)
    })

    item.appendChild(vid)
    item.appendChild(t)
    item.appendChild(views)

    item.onclick = () => openPlayer(v)

    home.appendChild(item)

})

// abrir player
function openPlayer(video){

    home.style.display = "none"
    playerScreen.style.display = "flex"
    backBtn.style.display = "block"

    music.pause()

    mainVideo.src = "videos/" + video.file
    title.innerText = video.title

    list.innerHTML = ""

    videos.forEach(v => {

        if(v.file === video.file) return

        const card = document.createElement("div")
        card.className = "video-card"

        const thumb = document.createElement("div")
        thumb.className = "thumb"

        const preview = document.createElement("video")
        preview.src = "videos/" + v.file

        thumb.appendChild(preview)

        const info = document.createElement("div")

        const name = document.createElement("div")
        name.innerText = v.title

        info.appendChild(name)

        card.appendChild(thumb)
        card.appendChild(info)

        card.onclick = () => openPlayer(v)

        list.appendChild(card)

    })

    const key = safeKey(video.file)

    db.ref("views/" + key).on("value", snap => {
        stats.innerText = (snap.val() || 0) + " views • " + timeAgo(video.date)
    })

}

// voltar
function goHome(){

    mainVideo.pause()
    mainVideo.currentTime = 0

    playerScreen.style.display = "none"
    home.style.display = "grid"
    backBtn.style.display = "none"

    music.play().catch(()=>{})
}

</script>

</body>
</html>
